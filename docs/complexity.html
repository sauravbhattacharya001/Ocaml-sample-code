<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OCaml Algorithm &amp; Data Structure Complexity Reference</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d1117;--card:#161b22;--border:#30363d;--text:#c9d1d9;--text2:#8b949e;--accent:#58a6ff;--green:#3fb950;--yellow:#d29922;--orange:#db6d28;--red:#f85149;--purple:#bc8cff}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;padding:20px}
h1{text-align:center;font-size:1.8em;margin-bottom:4px;color:#fff}
.subtitle{text-align:center;color:var(--text2);margin-bottom:24px;font-size:.95em}
.controls{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-bottom:20px;align-items:center}
.controls input{background:var(--card);border:1px solid var(--border);color:var(--text);padding:8px 14px;border-radius:6px;font-size:.9em;width:280px}
.controls select{background:var(--card);border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:6px;font-size:.9em}
.stats{text-align:center;color:var(--text2);font-size:.85em;margin-bottom:16px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:14px;max-width:1400px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;transition:border-color .2s}
.card:hover{border-color:var(--accent)}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.card-title{font-weight:600;font-size:1.05em;color:#fff}
.card-file{font-size:.75em;color:var(--text2);font-family:monospace}
.badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:.7em;font-weight:600;text-transform:uppercase}
.cat-ds{background:#1f3a2a;color:var(--green)}
.cat-algo{background:#2a1f1f;color:var(--orange)}
.cat-math{background:#2a2a1f;color:var(--yellow)}
.cat-lang{background:#1f1f3a;color:var(--purple)}
.cat-sys{background:#1f2a3a;color:var(--accent)}
.cat-ai{background:#3a1f2a;color:var(--red)}
.complexity-row{display:flex;gap:6px;flex-wrap:wrap;margin:6px 0}
.cx{font-size:.78em;padding:3px 8px;border-radius:4px;font-family:'SF Mono',Monaco,monospace}
.cx-best{background:#1a3a1a;color:var(--green)}
.cx-avg{background:#3a3a1a;color:var(--yellow)}
.cx-worst{background:#3a1a1a;color:var(--red)}
.cx-space{background:#1a2a3a;color:var(--accent)}
.ops{margin-top:8px;font-size:.82em;color:var(--text2)}
.ops strong{color:var(--text);font-weight:500}
.desc{font-size:.82em;color:var(--text2);margin-top:6px;line-height:1.5}
.legend{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin-bottom:20px;font-size:.8em;color:var(--text2)}
.legend span{display:flex;align-items:center;gap:4px}
.legend .dot{width:10px;height:10px;border-radius:3px;display:inline-block}
.sort-label{color:var(--text2);font-size:.85em}
@media(max-width:600px){.grid{grid-template-columns:1fr}.controls{flex-direction:column;align-items:stretch}.controls input{width:100%}}
</style>
</head>
<body>
<h1>🔬 Algorithm &amp; Data Structure Complexity Reference</h1>
<p class="subtitle">Big-O complexities for all implementations in this repository</p>

<div class="legend">
<span><span class="dot" style="background:var(--green)"></span> Best Case</span>
<span><span class="dot" style="background:var(--yellow)"></span> Average</span>
<span><span class="dot" style="background:var(--red)"></span> Worst Case</span>
<span><span class="dot" style="background:var(--accent)"></span> Space</span>
</div>

<div class="controls">
<input type="text" id="search" placeholder="🔍 Search algorithms, operations..." autocomplete="off">
<select id="catFilter"><option value="">All Categories</option></select>
<select id="cxFilter">
<option value="">All Complexities</option>
<option value="O(1)">O(1)</option>
<option value="O(log n)">O(log n)</option>
<option value="O(n)">O(n)</option>
<option value="O(n log n)">O(n log n)</option>
<option value="O(n²)">O(n²)</option>
<option value="O(2ⁿ)">O(2ⁿ)</option>
</select>
<span class="sort-label">Sort:</span>
<select id="sortBy">
<option value="name">Name</option>
<option value="complexity">Complexity (best→worst)</option>
<option value="category">Category</option>
</select>
</div>
<div class="stats" id="stats"></div>
<div class="grid" id="grid"></div>

const CX_ORDER={"O(1)":1,"O(α(n))":1.5,"O(k)":2,"O(log n)":3,"O(log₃₂ n)":3,"O(n)":4,"O(n·α(n))":4.5,"O(n log n)":5,"O(n²)":6,"O(n³)":7,"O(2ⁿ)":8,"O(n!)":9,"varies":7,"non-terminating":10,"undecidable":10};
function cxRank(s){for(let k in CX_ORDER)if(s&&s.includes(k))return CX_ORDER[k];return 5;}

const CAT_LABELS={ds:"Data Structure",algo:"Algorithm",math:"Math & Science",lang:"Language & FP",sys:"Systems & Concurrency",ai:"AI & ML"};
const CAT_CLASS={ds:"cat-ds",algo:"cat-algo",math:"cat-math",lang:"cat-lang",sys:"cat-sys",ai:"cat-ai"};

// Populate category filter
const cats=new Set(DATA.map(d=>d.cat));
const catSel=document.getElementById('catFilter');
[...cats].sort().forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=CAT_LABELS[c]||c;catSel.appendChild(o);});

function render(){
  const q=document.getElementById('search').value.toLowerCase();
  const cat=catSel.value;
  const cx=document.getElementById('cxFilter').value;
  const sort=document.getElementById('sortBy').value;

  let items=DATA.filter(d=>{
    if(cat&&d.cat!==cat)return false;
    if(cx){const all=[d.best,d.avg,d.worst,d.space].join(' ');if(!all.includes(cx))return false;}
    if(q){const hay=(d.name+' '+d.ops+' '+d.desc+' '+d.file).toLowerCase();if(!hay.includes(q))return false;}
    return true;
  });

  if(sort==='complexity')items.sort((a,b)=>cxRank(a.avg)-cxRank(b.avg));
  else if(sort==='category')items.sort((a,b)=>a.cat.localeCompare(b.cat)||a.name.localeCompare(b.name));
  else items.sort((a,b)=>a.name.localeCompare(b.name));

  document.getElementById('stats').textContent=`Showing ${items.length} of ${DATA.length} entries`;

  const grid=document.getElementById('grid');
  grid.innerHTML=items.map(d=>`
    <div class="card">
      <div class="card-header">
        <div><span class="card-title">${d.name}</span><br><span class="card-file">${d.file}</span></div>
        <span class="badge ${CAT_CLASS[d.cat]}">${CAT_LABELS[d.cat]}</span>
      </div>
      <div class="complexity-row">
        <span class="cx cx-best" title="Best case">⚡ ${d.best}</span>
        <span class="cx cx-avg" title="Average">📊 ${d.avg}</span>
        <span class="cx cx-worst" title="Worst case">🔥 ${d.worst}</span>
        <span class="cx cx-space" title="Space">💾 ${d.space}</span>
      </div>
      <div class="ops"><strong>Operations:</strong> ${d.ops}</div>
      <div class="desc">${d.desc}</div>
    </div>
  `).join('');
}

document.getElementById('search').addEventListener('input',render);
catSel.addEventListener('change',render);
document.getElementById('cxFilter').addEventListener('change',render);
document.getElementById('sortBy').addEventListener('change',render);
render();
</script>
