# Labels applied based on changed file paths
# Used with actions/labeler@v6 in label.yml workflow

ocaml:
  - changed-files:
      - any-glob-to-any-file: '*.ml'

ci:
  - changed-files:
      - any-glob-to-any-file: '.github/workflows/**'

docker:
  - changed-files:
      - any-glob-to-any-file:
          - 'Dockerfile'
          - '.dockerignore'
          - '.github/workflows/docker.yml'

documentation:
  - changed-files:
      - any-glob-to-any-file:
          - '*.md'
          - 'docs/**'

tests:
  - changed-files:
      - any-glob-to-any-file:
          - 'test_*.ml'
          - '__tests__/**'

