name: Stale Issues & PRs

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 6am UTC
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - name: Close stale issues and PRs
        uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          days-before-stale: 60
          days-before-close: 14
          stale-issue-label: stale
          stale-pr-label: stale
          stale-issue-message: >
            This issue has been inactive for 60 days and will be closed in 14 days
            unless there is new activity. If this is still relevant, please comment
            or update the issue.
          stale-pr-message: >
            This PR has been inactive for 60 days and will be closed in 14 days
            unless there is new activity. Please rebase or update if still relevant.
          close-issue-message: >
            Closed due to inactivity. Feel free to reopen if still relevant.
          close-pr-message: >
            Closed due to inactivity. Feel free to reopen with updates.
          exempt-issue-labels: 'pinned,security,enhancement'
          exempt-pr-labels: 'pinned,security'
