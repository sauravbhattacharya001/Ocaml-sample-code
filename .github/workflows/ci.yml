# CI/CD Pipeline — OCaml Sample Code
# Builds all programs, runs tests, and checks formatting on every push/PR.

name: CI

on:
  push:
    # `master` is this repo's default branch; `main` is kept for legacy/parity.
    branches: [master, main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
      - '.editorconfig'
  pull_request:
    branches: [master, main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
      - '.editorconfig'
  workflow_dispatch:

permissions:
  contents: read

# Cancel superseded runs on the same ref to save CI minutes — the most
# recent commit is always what we actually want to validate.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build-and-test:
    name: Build & Test (OCaml ${{ matrix.ocaml-compiler }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        ocaml-compiler: ["5.x", "4.14.x"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up OCaml ${{ matrix.ocaml-compiler }}
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: ${{ matrix.ocaml-compiler }}
          dune-cache: true

      - name: Install dependencies
        run: |
          opam install bisect_ppx ocamlfind alcotest --yes
          eval $(opam env)

      - name: Build all programs
        run: |
          eval $(opam env)
          make all

      - name: Run tests
        run: |
          eval $(opam env)
          make test

      - name: Run all programs (smoke test)
        run: |
          eval $(opam env)
          make run

  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Check for ocamlformat config
        id: fmt
        run: |
          if [ -f .ocamlformat ]; then
            echo "has_config=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_config=false" >> "$GITHUB_OUTPUT"
            echo "No .ocamlformat config found — skipping format check (build-and-test covers compile validation)."
          fi

      - name: Set up OCaml
        if: steps.fmt.outputs.has_config == 'true'
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "5.x"
          dune-cache: true

      - name: Install ocamlformat
        if: steps.fmt.outputs.has_config == 'true'
        run: opam install ocamlformat --yes

      - name: Check formatting
        if: steps.fmt.outputs.has_config == 'true'
        run: |
          eval $(opam env)
          ocamlformat --check *.ml
