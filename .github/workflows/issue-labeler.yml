name: Auto-label Issues

on:
  issues:
    types: [opened, edited]

permissions:
  issues: write

jobs:
  label-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Auto-label based on content
        uses: actions/github-script@v9
        with:
          script: |
            const issue = context.payload.issue;
            const text = `${issue.title} ${issue.body || ''}`.toLowerCase();
            const labelsToAdd = [];

            const rules = [
              { keywords: ['data structure', 'bst', 'btree', 'heap', 'trie', 'queue', 'stack', 'hash', 'tree', 'linked list'], label: 'data-structures' },
              { keywords: ['algorithm', 'sort', 'search', 'graph', 'dijkstra', 'fibonacci', 'dynamic programming', 'dfs', 'bfs'], label: 'algorithms' },
              { keywords: ['parser', 'parsing', 'peg', 'earley', 'regex', 'json', 'csv', 'lexer', 'tokenizer'], label: 'parsing' },
              { keywords: ['concurrent', 'concurrency', 'parallel', 'actor', 'mutex', 'thread', 'async', 'channel'], label: 'concurrency' },
              { keywords: ['distributed', 'raft', 'crdt', 'consensus', 'replication'], label: 'distributed-systems' },
              { keywords: ['formal', 'sat', 'smt', 'theorem', 'prover', 'model check', 'verification', 'quickcheck'], label: 'formal-methods' },
              { keywords: ['type', 'gadt', 'lambda', 'monad', 'functor', 'polymorphism', 'inference'], label: 'type-theory' },
              { keywords: ['interpreter', 'bytecode', 'vm', 'evaluator', 'datalog', 'rewriting'], label: 'interpreters' },
              { keywords: ['matrix', 'calculus', 'integral', 'differentiation', 'probability', 'geometry', 'numerical'], label: 'numerical' },
              { keywords: ['security', 'crypto', 'encrypt', 'hash', 'vulnerability', 'cve'], label: 'security' },
              { keywords: ['neural', 'machine learning', 'bayesian', 'genetic algorithm', 'bandit', 'markov', 'hmm', 'regression', 'classification'], label: 'ai-ml' },
              { keywords: ['agent', 'bdi', 'behavior tree', 'blackboard', 'negotiation', 'argumentation', 'auction', 'planning', 'contract net'], label: 'multi-agent' },
              { keywords: ['profiler', 'refactoring', 'code transform', 'dependency audit', 'code archaeology', 'mentor', 'benchmark', 'incremental'], label: 'devtools' },
              { keywords: ['raytracer', 'render', 'music', 'l-system', 'fractal', 'graphics', 'visualization'], label: 'graphics' },
              { keywords: ['ci', 'workflow', 'github action', 'pipeline', 'build'], label: 'ci' },
              { keywords: ['docker', 'container', 'dockerfile'], label: 'docker' },
              { keywords: ['doc', 'readme', 'documentation', 'comment', 'docstring'], label: 'documentation' },
              { keywords: ['test', 'testing', 'unit test', 'coverage', 'assertion'], label: 'tests' },
              { keywords: ['bug', 'error', 'crash', 'fix', 'broken', 'segfault', 'exception'], label: 'bug' },
              { keywords: ['feature', 'enhancement', 'add', 'implement', 'support'], label: 'enhancement' },
              { keywords: ['performance', 'slow', 'optimize', 'memory leak', 'profiling', 'benchmark'], label: 'performance' },
              { keywords: ['refactor', 'cleanup', 'technical debt', 'simplify', 'restructure'], label: 'refactor' },
            ];

            const existingLabels = issue.labels.map(l => l.name);

            // Priority detection
            const priorityRules = [
              { keywords: ['critical', 'urgent', 'crash', 'segfault', 'data loss', 'security vulnerability', 'production'], label: 'priority/critical' },
              { keywords: ['important', 'high priority', 'blocker', 'regression', 'broken'], label: 'priority/high' },
              { keywords: ['nice to have', 'low priority', 'minor', 'cosmetic', 'trivial', 'nit'], label: 'priority/low' },
            ];

            for (const rule of priorityRules) {
              if (existingLabels.includes(rule.label)) continue;
              if (rule.keywords.some(kw => text.includes(kw))) {
                labelsToAdd.push(rule.label);
                break; // Only one priority label
              }
            }

            for (const rule of rules) {
              if (existingLabels.includes(rule.label)) continue;
              if (rule.keywords.some(kw => text.includes(kw))) {
                labelsToAdd.push(rule.label);
              }
            }

            if (labelsToAdd.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: labelsToAdd,
              });
              console.log(`Added labels: ${labelsToAdd.join(', ')}`);
            } else {
              // No rules matched — add needs-triage so nothing slips through
              if (!existingLabels.includes('needs-triage')) {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  labels: ['needs-triage'],
                });
                console.log('No keyword match — added needs-triage');
              }
            }
