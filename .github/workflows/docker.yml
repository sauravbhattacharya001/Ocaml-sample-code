name: Docker Build & Push

on:
  push:
    branches: [master]
    tags: ['v*']
    paths:
      - '*.ml'
      - 'Makefile'
      - 'Dockerfile'
      - '.dockerignore'
      - '.github/workflows/docker.yml'
  pull_request:
    branches: [master]
    paths:
      - '*.ml'
      - 'Makefile'
      - 'Dockerfile'
      - '.dockerignore'
  schedule:
    # Rebuild weekly to pick up base image security patches
    - cron: '20 4 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  security-events: write
  id-token: write          # OIDC for build provenance attestation
  attestations: write      # attach attestation to the image

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-test:
    name: Build, Smoke Test & Scan (amd64)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      image-tag: ${{ steps.scan-tag.outputs.tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build image (amd64, local load for testing)
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Smoke test - verify all binaries execute
        run: |
          IMAGE_TAG=$(echo "${{ steps.meta.outputs.tags }}" | head -n1)
          echo "Testing image: $IMAGE_TAG"

          # Run default CMD (all 8 binaries in sequence)
          docker run --rm "$IMAGE_TAG"

          # Verify each binary individually returns exit code 0
          for bin in hello fibonacci factor list_last_elem bst mergesort graph heap; do
            echo "--- testing $bin ---"
            docker run --rm --entrypoint "$bin" "$IMAGE_TAG"
            echo "OK $bin passed"
          done

          echo "=== All binary smoke tests passed ==="

      - name: Report image size
        run: |
          IMAGE_TAG=$(echo "${{ steps.meta.outputs.tags }}" | head -n1)
          SIZE=$(docker image inspect "$IMAGE_TAG" --format '{{.Size}}')
          SIZE_MB=$(echo "scale=2; $SIZE / 1048576" | bc)
          echo "### 📦 Image size: ${SIZE_MB} MB" >> "$GITHUB_STEP_SUMMARY"
          echo "Image: $IMAGE_TAG — ${SIZE_MB} MB"

      - name: Determine scan target
        id: scan-tag
        run: echo "tag=$(echo '${{ steps.meta.outputs.tags }}' | head -n1)" >> "$GITHUB_OUTPUT"

      - name: Scan image for vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.scan-tag.outputs.tag }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'

      - name: Upload Trivy scan results to GitHub Security
        if: always() && hashFiles('trivy-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: docker-trivy

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ steps.scan-tag.outputs.tag }}
          format: spdx-json
          output-file: sbom-spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-spdx
          path: sbom-spdx.json
          retention-days: 90

  push:
    name: Push Multi-Platform Image
    needs: build-test
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU (for arm64 cross-compilation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push multi-platform image
        id: push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
