name: Welcome First-Time Contributors

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - name: Greet new contributors
        uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: |
            Welcome to **OCaml Sample Code**! 🐫 Thanks for opening your first issue.

            Here's how to help us help you:
            - **Bug reports**: include the OCaml version (`ocaml --version`), OS, and a minimal reproduction
            - **Feature requests**: describe the algorithm or data structure and link a reference paper or textbook
            - **Questions**: feel free to ask — we're happy to discuss OCaml patterns and implementation details

            Auto-labeling will tag your issue based on its content. A maintainer will review it shortly.
          pr-message: |
            Welcome to **OCaml Sample Code**! 🐫 Thanks for your first pull request.

            Before we review:
            - Make sure `make` completes without errors
            - Run the test suite with `make test` if your change touches an existing module
            - Follow the existing code style (2-space indent, descriptive names, doc comments)
            - Each `.ml` file should be self-contained with its own tests where applicable

            Your PR will be auto-labeled by size and file category. A maintainer will review shortly!
