name: Coverage

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: '5.x'

      - name: Install dependencies
        run: |
          opam install bisect_ppx --yes
          eval $(opam env)

      - name: Build individual modules with coverage
        run: |
          eval $(opam env)
          # Build key source modules with bisect_ppx instrumentation
          # to get per-file coverage metrics on the actual library code
          BISECT_FLAGS="-package bisect_ppx -linkpkg"

          # Compile standalone modules that test_all exercises
          for src in bst.ml fibonacci.ml factor.ml mergesort.ml heap.ml \
                     graph.ml dijkstra.ml sorting.ml queue.ml trie.ml \
                     union_find.ml bloom_filter.ml hashmap.ml rbtree.ml \
                     lru_cache.ml rope.ml skip_list.ml segment_tree.ml \
                     interval_tree.ml fenwick_tree.ml suffix_array.ml \
                     matrix.ml huffman.ml calculus.ml json.ml regex.ml \
                     memoize.ml ring_buffer.ml cuckoo_filter.ml \
                     compression.ml splay_tree.ml aa_tree.ml astar.ml \
                     bplus_tree.ml btree.ml cellular_automata.ml \
                     constraint.ml dancing_links.ml finger_tree.ml \
                     free_monad.ml geometry.ml order_statistics_tree.ml \
                     pairing_heap.ml sat_solver.ml treap.ml \
                     persistent_vector.ml signal_processing.ml \
                     crypto.ml crdt.ml csp.ml diff.ml graph_db.ml \
                     raft.ml stm.ml \
                     deque.ml string_match.ml zipper.ml hamt.ml \
                     kd_tree.ml binomial_heap.ml fibonacci_heap.ml \
                     leftist_heap.ml radix_tree.ml scapegoat_tree.ml \
                     two_three_tree.ml weight_balanced_tree.ml \
                     van_emde_boas.ml count_min_sketch.ml \
                     consistent_hashing.ml merkle_tree.ml \
                     hyperloglog.ml sparse_table.ml polynomial.ml \
                     autodiff.ml tensor.ml integration.ml \
                     abstract_interp.ml abstract_machine.ml actor.ml \
                     adaptive_radix_tree.ml ant_colony.ml argumentation.ml \
                     auction.ml automata.ml bandit.ml bayesian_net.ml \
                     bdd.ml bdi_agent.ml behavior_tree.ml blackboard.ml \
                     bytecode_vm.ml cartesian_tree.ml comonad.ml \
                     contract_net.ml csv.ml datalog.ml delimited_cont.ml \
                     earley.ml effects.ml euler_tour_tree.ml forth.ml \
                     frp.ml fsm.ml gadts.ml game_ai.ml gc_simulator.ml \
                     genetic.ml gossip.ml hmm.ml http_server.ml \
                     incremental.ml influence_maximization.ml lambda.ml \
                     leader_election.ml link_cut_tree.ml logic_circuit.ml \
                     lsystem.ml maze.ml mdp.ml mini_sql.ml \
                     minikanren.ml model_checker.ml monad_transformers.ml \
                     music.ml negotiation.ml network_flow.ml \
                     neural_network.ml optics.ml parser.ml peg.ml \
                     persistent_array.ml petri_net.ml planning.ml \
                     probability.ml process_calculus.ml prolog.ml \
                     proof_assistant.ml quadtree.ml quickcheck.ml \
                     random_access_list.ml raytracer.ml \
                     reactive_streams.ml relational.ml simplex.ml \
                     spreadsheet.ml stream.ml succinct_bitvector.ml \
                     suffix_automaton.ml suffix_tree.ml \
                     symbolic_regression.ml task_scheduler.ml \
                     term_rewriting.ml theorem_prover.ml \
                     turing_machine.ml type_infer.ml typeclass.ml \
                     wavelet_tree.ml yfast_trie.ml zip_tree.ml \
                     benchmark.ml dining_philosophers.ml hello.ml \
                     list_last_elem.ml; do
            if [ -f "$src" ]; then
              ocamlfind ocamlopt $BISECT_FLAGS "$src" -o "${src%.ml}_cov" 2>/dev/null || true
            fi
          done

      - name: Build test suite with coverage instrumentation
        run: |
          eval $(opam env)
          # Compile test_all.ml with bisect_ppx — this is the main test harness
          # that exercises all core algorithms inline
          ocamlfind ocamlopt -package bisect_ppx -linkpkg \
            test_all.ml -o test_all_cov 2>/dev/null || \
          ocamlfind ocamlc -package bisect_ppx -linkpkg \
            test_all.ml -o test_all_cov

      - name: Build individual test suites with coverage
        run: |
          eval $(opam env)
          # Build and run individual test files for modules that have them
          BISECT_FLAGS="-package bisect_ppx -linkpkg"
          for test_src in test_aa_tree.ml test_astar.ml \
                          test_bloom_filter.ml test_bplus_tree.ml \
                          test_btree.ml test_cellular_automata.ml \
                          test_constraint.ml test_crdt.ml test_crypto.ml \
                          test_csp.ml test_dancing_links.ml test_diff.ml \
                          test_finger_tree.ml test_free_monad.ml \
                          test_geometry.ml test_graph_db.ml \
                          test_huffman.ml test_interval_tree.ml \
                          test_json.ml test_lru_cache.ml test_matrix.ml \
                          test_memoize.ml test_order_statistics_tree.ml \
                          test_pairing_heap.ml test_persistent_vector.ml \
                          test_queue.ml test_raft.ml test_ring_buffer.ml \
                          test_rope.ml test_sat_solver.ml \
                          test_segment_tree.ml test_signal_processing.ml \
                          test_skip_list.ml test_stm.ml \
                          test_suffix_array.ml test_treap.ml \
                          test_autodiff.ml; do
            if [ -f "$test_src" ]; then
              # Each test file includes its module source inline or via #use
              ocamlfind ocamlopt $BISECT_FLAGS "$test_src" -o "${test_src%.ml}_cov" 2>/dev/null || \
              ocamlfind ocamlc $BISECT_FLAGS "$test_src" -o "${test_src%.ml}_cov" 2>/dev/null || true
            fi
          done

      - name: Build standalone modules with inline tests
        run: |
          eval $(opam env)
          BISECT_FLAGS="-package bisect_ppx -linkpkg"
          # Many modules have inline test suites (let () = ... at bottom)
          # Build each as a standalone executable for coverage
          for src in deque.ml string_match.ml zipper.ml hamt.ml \
                     kd_tree.ml binomial_heap.ml fibonacci_heap.ml \
                     leftist_heap.ml radix_tree.ml scapegoat_tree.ml \
                     two_three_tree.ml weight_balanced_tree.ml \
                     van_emde_boas.ml count_min_sketch.ml \
                     consistent_hashing.ml merkle_tree.ml \
                     hyperloglog.ml sparse_table.ml polynomial.ml \
                     autodiff.ml tensor.ml integration.ml \
                     abstract_interp.ml abstract_machine.ml actor.ml \
                     adaptive_radix_tree.ml ant_colony.ml automata.ml \
                     bandit.ml bayesian_net.ml bdd.ml bdi_agent.ml \
                     behavior_tree.ml blackboard.ml bytecode_vm.ml \
                     cartesian_tree.ml comonad.ml contract_net.ml \
                     datalog.ml delimited_cont.ml earley.ml effects.ml \
                     euler_tour_tree.ml forth.ml frp.ml fsm.ml gadts.ml \
                     game_ai.ml gc_simulator.ml genetic.ml gossip.ml \
                     hmm.ml incremental.ml influence_maximization.ml \
                     lambda.ml leader_election.ml link_cut_tree.ml \
                     logic_circuit.ml lsystem.ml maze.ml mdp.ml \
                     mini_sql.ml minikanren.ml model_checker.ml \
                     monad_transformers.ml music.ml negotiation.ml \
                     network_flow.ml neural_network.ml optics.ml \
                     parser.ml peg.ml persistent_array.ml petri_net.ml \
                     planning.ml probability.ml process_calculus.ml \
                     prolog.ml proof_assistant.ml quadtree.ml \
                     quickcheck.ml random_access_list.ml raytracer.ml \
                     reactive_streams.ml relational.ml simplex.ml \
                     spreadsheet.ml stream.ml succinct_bitvector.ml \
                     suffix_automaton.ml suffix_tree.ml \
                     symbolic_regression.ml task_scheduler.ml \
                     term_rewriting.ml theorem_prover.ml \
                     turing_machine.ml type_infer.ml typeclass.ml \
                     wavelet_tree.ml yfast_trie.ml zip_tree.ml; do
            if [ -f "$src" ]; then
              out="${src%.ml}_inline_cov"
              ocamlfind ocamlopt $BISECT_FLAGS "$src" -o "$out" 2>/dev/null || \
              ocamlfind ocamlc $BISECT_FLAGS "$src" -o "$out" 2>/dev/null || true
            fi
          done

      - name: Run all tests with coverage
        run: |
          eval $(opam env)
          export BISECT_FILE=$(pwd)/bisect

          # Run main test suite
          ./test_all_cov || true

          # Run individual test suites (test_*_cov)
          for cov_bin in test_*_cov; do
            if [ -x "$cov_bin" ] && [ "$cov_bin" != "test_all_cov" ]; then
              echo "=== Running $cov_bin ==="
              ./"$cov_bin" || true
            fi
          done

          # Run standalone modules with inline tests
          for cov_bin in *_inline_cov; do
            if [ -x "$cov_bin" ]; then
              echo "=== Running $cov_bin ==="
              ./"$cov_bin" || true
            fi
          done

      - name: Generate coverage reports
        run: |
          eval $(opam env)
          echo "=== Coverage Summary ==="
          bisect-ppx-report summary
          echo ""
          echo "=== Per-file Coverage ==="
          bisect-ppx-report summary --per-file
          bisect-ppx-report html -o _coverage

      - name: Upload coverage HTML report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: _coverage/
          retention-days: 30

      - name: Generate Codecov report
        run: |
          eval $(opam env)
          bisect-ppx-report cobertura --output coverage.xml 2>/dev/null || \
          bisect-ppx-report lcov --output coverage.lcov 2>/dev/null || true

      - name: Upload to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: coverage.xml,coverage.lcov
          flags: ocaml-tests
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Coverage badge data
        run: |
          eval $(opam env)
          COVERAGE=$(bisect-ppx-report summary 2>/dev/null | grep -oP '\d+\.\d+(?=%)' | head -1 || echo "0")
          echo "Total coverage: ${COVERAGE}%"

          COV_INT=${COVERAGE%.*}
          if [ "$COV_INT" -ge 90 ]; then COLOR="brightgreen"
          elif [ "$COV_INT" -ge 75 ]; then COLOR="green"
          elif [ "$COV_INT" -ge 60 ]; then COLOR="yellowgreen"
          elif [ "$COV_INT" -ge 40 ]; then COLOR="yellow"
          else COLOR="red"; fi

          echo "COVERAGE=${COVERAGE}" >> $GITHUB_ENV
          echo "BADGE_COLOR=${COLOR}" >> $GITHUB_ENV
