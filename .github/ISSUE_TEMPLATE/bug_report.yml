name: Bug Report
description: Report incorrect output, compilation errors, or unexpected behavior
title: "[Bug] "
labels: ["bug"]
assignees:
  - sauravbhattacharya001
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the fields below so we can investigate.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
      placeholder: What went wrong?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      value: |
        1. Compile: `ocamlopt -o <program> <file>.ml`
        2. Run: `./<program>`
        3. Observe: ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happens? Include exact error messages or output.
    validations:
      required: true

  - type: input
    id: ocaml-version
    attributes:
      label: OCaml Version
      description: Output of `ocaml -version`
      placeholder: "5.1.0"
    validations:
      required: false

  - type: dropdown
    id: compiler
    attributes:
      label: Compiler
      description: Which compiler are you using?
      options:
        - ocamlopt (native)
        - ocamlc (bytecode)
        - utop (toplevel)
        - dune
        - Other
    validations:
      required: false

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "Ubuntu 22.04 / macOS 14 / Windows 11"
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other relevant information (logs, screenshots, related issues).
    validations:
      required: false
