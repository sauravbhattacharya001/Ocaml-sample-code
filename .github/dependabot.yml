# Dependabot configuration
# Keeps GitHub Actions, npm, and Docker dependencies up to date.
# OCaml/opam is not supported by Dependabot natively.

version: 2
updates:
  # GitHub Actions - keep workflow actions current
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "ci"
      include: "scope"
    labels:
      - "dependencies"
      - "github-actions"
    reviewers:
      - "sauravbhattacharya001"
    open-pull-requests-limit: 10
    groups:
      github-actions:
        patterns:
          - "*"

  # npm - keep JavaScript dev dependencies (jest) up to date
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "npm"
      include: "scope"
    labels:
      - "dependencies"
      - "javascript"
    reviewers:
      - "sauravbhattacharya001"
    open-pull-requests-limit: 5
    groups:
      npm-all:
        patterns:
          - "*"

  # Docker - keep base image (ocaml/opam) up to date
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "docker"
      include: "scope"
    labels:
      - "dependencies"
      - "docker"
    reviewers:
      - "sauravbhattacharya001"
    open-pull-requests-limit: 5
