# Dependabot configuration
# Keeps GitHub Actions, npm, and Docker dependencies up to date.
# OCaml/opam is not supported by Dependabot natively — see CONTRIBUTING.md
# for the manual `opam update && opam upgrade` workflow.
#
# Schedules are staggered Mon→Wed across ecosystems so PRs don't all land
# on the same morning and crowd the review queue.

version: 2
updates:
  # --------------------------------------------------------------------------
  # GitHub Actions — keep workflow actions current
  # --------------------------------------------------------------------------
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Etc/UTC"
    commit-message:
      prefix: "ci"
      include: "scope"
    labels:
      - "dependencies"
      - "github-actions"
    reviewers:
      - "sauravbhattacharya001"
    open-pull-requests-limit: 10
    groups:
      # Group all minor + patch action bumps into one PR per week to cut noise.
      # Major bumps (e.g. actions/checkout@v4 → v5) stay separate so they get
      # their own review.
      github-actions-minor:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # --------------------------------------------------------------------------
  # npm — keep JavaScript dev dependencies (Jest et al.) up to date
  # --------------------------------------------------------------------------
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "06:00"
      timezone: "Etc/UTC"
    commit-message:
      prefix: "npm"
      include: "scope"
    labels:
      - "dependencies"
      - "javascript"
    reviewers:
      - "sauravbhattacharya001"
    open-pull-requests-limit: 5
    versioning-strategy: "increase"
    groups:
      # Bundle dev-only minor/patch bumps; surface majors separately.
      npm-dev-minor:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
      npm-prod-minor:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"

  # --------------------------------------------------------------------------
  # Docker — keep the ocaml/opam base image up to date
  # --------------------------------------------------------------------------
  # NOTE: We pin to the ocaml/opam:ubuntu-24.04-ocaml-5.x family in the
  # Dockerfile. Major OCaml bumps (5.x → 6.x) tend to break Makefile flag
  # assumptions and need a manual sweep, so we let Dependabot propose them
  # but mark them clearly via labels — they should NOT be auto-merged.
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "wednesday"
      time: "06:00"
      timezone: "Etc/UTC"
    commit-message:
      prefix: "docker"
      include: "scope"
    labels:
      - "dependencies"
      - "docker"
    reviewers:
      - "sauravbhattacharya001"
    open-pull-requests-limit: 3
    ignore:
      # OCaml major upgrades require coordinated changes to opam switch,
      # Makefile flags, and the test_all.ml suite. Block dependabot from
      # opening drive-by major-bump PRs that always need to be closed.
      - dependency-name: "ocaml/opam"
        update-types:
          - "version-update:semver-major"
